name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies and Build APK
        run: |
          PROJECT_DIR=$(dirname $(find . -name pubspec.yaml -print -quit))
          echo "Found project root at: $PROJECT_DIR"
          cd $PROJECT_DIR
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Verdexa-APK
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
